    #     url = "/categories/"
    #     weight = 10

    [[menu.main]]
        identifier = "series"
        name = "Series"
        url = "/series/"
        weight = 10
    
    [[menu.main]]
        identifier = "tags"
        name = "Tags"
        url = "/tags/"
        weight = 20 # used to identify the order of the elements

    [[menu.main]]
        identifier = "archives"
        name = "Archives"
        url = "/archives/"
        weight = 30

    [[menu.main]]
        identifier = "about"
        name = "About"
        url = "/about/"
        weight = 40

    