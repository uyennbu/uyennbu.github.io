baseURL = "https://uyennbu.github.io/"
canonifyURLs = true    # chuyển mọi đường dẫn thành tuyệt đối dựa trên baseURL
relativeURLs = false   # (tuỳ chọn) để link không bị chuyển thành tương đối
languageCode = "en-us"
title = "Uyen's blog"
theme = "PaperMod"

[taxonomies]
  tag = "tags"
#   category = "categories"
  series = "series"

[markup]
  [markup.goldmark]
    [markup.goldmark.extensions]
      [markup.goldmark.extensions.passthrough]
        enable = true
        [markup.goldmark.extensions.passthrough.delimiters]
          block = [['\[', '\]'], ['$$', '$$']]
          inline = [['$', '$']]

[params]
    author = "Nguyen Bich Uyen"
    ShowMenu = true
    ShowBreadCrumbs = true
    ShowReadingTime = true
    ShowPostNavLinks = true
    ShowShareButtons = true
    ShowToc = true

    math = true

    [params.homeInfoParams]
        Title = "Hello, have a fun and happy day! ☘️"
        Content = """
🌻 Xin chào, mình là Uyên và đây là bog nhỏ của mình, nơi mình chia sẻ về những kiến thức và những cảm nhận của cá nhân mình trong quá trình học đại học. 

🌻 Cảm ơn bạn vì đã giành thời gian cho mình, chúc bạn một ngày tốt lành :>.

Ảnh hoa cover mình lấy trên Pinterest: https://www.pinterest.com/pin/3870349675132799/"""

    [[params.socialIcons]]
        name = "facebook"
        url = "https://www.facebook.com/bich.uyen.643513"
    
    [[params.socialIcons]]
        name = "linkedin"
        url = "https://www.linkedin.com/in/uyen-nguyen-bich-3875862ba/"

    [[params.socialIcons]]
        name = "github"
        url = "https://github.com/uyennbu"

    [[params.socialIcons]]
        name = "email"
        url = "mailto:uyennguyen.nbu@gmail.com"

    [params.cover]
        linkFullImages = false

[menu]
